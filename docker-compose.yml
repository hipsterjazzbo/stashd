services:
  stashd:
    image: ghcr.io/hipsterjazzbo/stashd:latest
    container_name: stashd
    ports:
      - "8474:8474"
    environment:
      STASHD_PUBLIC_URL: http://localhost:8474
      STASHD_HTTP_PORT: "8474"
      STASHD_DATA_PATH: /data
      STASHD_MEDIA_PATH: /media
      SIGNING_KEY: ${SIGNING_KEY:-}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      UMASK: ${UMASK:-0022}
    volumes:
      - ./data:/data
      - ./media:/media
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8474/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
