name: Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Lerd development image
        run: docker build --target dev -t stashd:ci .

      - name: Run quality checks in Lerd
        run: |
          docker run --rm --entrypoint sh \
            -v "$GITHUB_WORKSPACE:/var/www/html" \
            -w /var/www/html \
            stashd:ci -lc '
              git config --global --add safe.directory /var/www/html
              composer install --no-interaction --prefer-dist --no-progress
              npm ci
              composer lint
              composer test:static
              npm run typecheck
              composer test:parallel
            '

  smoke:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run container smoke test
        run: composer test:docker-smoke

  e2e:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install browser dependencies
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run authenticated browser smoke test
        run: tests/e2e/run.sh

  build:
    needs: [quality, smoke, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Skipped on pull_request: forked PRs don't have package-write access,
      # and this job only validates the build there (push: false below).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags/labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/hipsterjazzbo/stashd
          flavor: |
            latest=false
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      # PRs build both platforms but don't push -- this is the regression
      # check that would have caught the Docker build being broken for
      # anyone but the original dev machine (see docs/TODO.md).
      - name: Build (and push on main/tags)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: prod
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
