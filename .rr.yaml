version: "3"

server:
  command: "php bin/worker.php"
  relay: pipes
  env:
    - APP_RUNTIME: RoadRunner

http:
  address: 0.0.0.0:${STASHD_HTTP_PORT:-8474}
  # Serve built front-end assets (public/build/) and the favicon straight from
  # disk, before the request reaches a PHP worker. Everything else falls through
  # to the Tempest router. Forbid serving source/secret files defensively.
  # The "static" middleware must be listed explicitly — declaring `static:`
  # alone only configures the plugin, it doesn't wire it into the chain.
  middleware: ["static"]
  static:
    dir: "public"
    forbid: [".php", ".htaccess", ".env"]
  pool:
    # Two workers starved the pool while an SSE stream held one for ~30s
    # (EventsController). Four still wasn't enough once a third page started
    # subscribing to /api/v1/events (each open page ties up one worker for
    # the stream's whole iteration window, on repeat via EventSource
    # auto-reconnect) — bumped to 8 alongside shortening that window. Revisit
    # both together if another SSE-subscribing page gets added.
    num_workers: 8
    supervisor:
      max_worker_memory: 128

logs:
  mode: development
  level: info
