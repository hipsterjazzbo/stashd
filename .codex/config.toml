[mcp_servers.lerd]
command = "lerd"
args = ["mcp"]

[mcp_servers.lerd.env]
LERD_SITE_PATH = "/home/hazel/Projects/stashd"

[mcp_servers.lerd.tools.worker]
approval_mode = "approve"

[mcp_servers.lerd.tools.logs]
approval_mode = "approve"

# Work autonomously inside the current repository.
sandbox_mode = "workspace-write"

# Permit Codex to request extra access when genuinely necessary.
approval_policy = "on-request"

# Have a separate reviewer agent handle those requests instead of
# interrupting me for every routine escalation.
approvals_reviewer = "auto_review"

# Most development workflows need package registries, documentation,
# GitHub, API calls, and similar network access.
[sandbox_workspace_write]
network_access = true

project_doc_fallback_filenames = ["CLAUDE.md"]